<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Celebración</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  text-align:center;
}

h1{
  margin-top:80px;
  font-size:3em;
}

button{
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#ff4081;
  color:white;
}

#fireworks{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}
</style>

</head>
<body>

<div id="fireworks"></div>

<h1>🎉 ¡Celebremos! 🎉</h1>

<button onclick="celebrar()">
Iniciar celebración
</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2cbb3d9a36.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2/dist/index.umd.js"></script>

<script>

const container = document.getElementById("fireworks");

const fireworks = new Fireworks.default(container,{
  rocketsPoint:{min:0,max:100}
});

function celebrar(){

  document.getElementById("music").play();

  fireworks.start();

  for(let i=0;i<5;i++){
    setTimeout(()=>{
      confetti({
        particleCount:200,
        spread:100,
        origin:{y:0.6}
      });
    },i*500);
  }

}

</script>

</body>
</html>
